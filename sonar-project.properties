sonar.organization=martynalepa123
sonar.projectKey=MartynaLepa_BudgetApp-Sonar
sonar.projectName=BudgetApp
sonar.modules=backend,frontend

# Konfiguracja modułu Backend
backend.sonar.projectName=BudgetApp-Backend
